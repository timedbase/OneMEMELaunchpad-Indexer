version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# OneMEME Launchpad — Production Stack
#
# Single container running the NestJS REST API under PM2.
# Database is hosted on Neon (external) — no local postgres here.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build   # build + start
#   docker compose -f docker-compose.prod.yml logs -f         # tail logs
#   docker compose -f docker-compose.prod.yml pull && \
#     docker compose -f docker-compose.prod.yml up -d         # update
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: onememe-launchpad:latest
    container_name: onememe-launchpad
    restart: unless-stopped

    ports:
      - "3001:3001"       # NestJS API — proxied by Cloudflare

    env_file:
      - .env              # SUBGRAPH_URL, SUBGRAPH_API_KEY, DATABASE_URL, etc.

    volumes:
      - /etc/ssl/onememe:/etc/ssl/onememe:ro   # Cloudflare origin cert (host → container)

    # Healthcheck hits the NestJS /health endpoint
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
